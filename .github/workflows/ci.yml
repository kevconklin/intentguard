name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # Core + dev only: the suite runs with no network, no OpenFGA, no LLM.
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Run injection demo (end-to-end smoke test)
        run: python examples/demo-injection/demo.py
